<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAPPY LIFE | هابي لايف</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --gold: #d4af37;
            --light-gold: #fceabb;
            --bg-black: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-black);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* =========================================
           شاشة الترحيب (المطورة بالكامل)
           ========================================= */
        #splash {
            position: fixed; 
            inset: 0; 
            background: black; 
            z-index: 10000;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* الجزء العلوي (الشعار والاسم) */
        .splash-top {
            margin-top: 10vh; /* يظهر في أعلى الشاشة */
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .splash-logo { 
            width: 100px; 
            border-radius: 50%; 
            border: 3px solid var(--gold); 
            margin-bottom: 15px; 
            filter: drop-shadow(0 0 15px var(--gold));
        }

        #splash h1 {
            color: var(--gold); 
            font-weight: 900; 
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        /* الجزء الأوسط (شريط التحميل في نص الشاشة تماماً) */
        .splash-middle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* يضمن التوسط في الطول والعرض */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-container { 
            width: min(280px, 80vw); 
            height: 6px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            overflow: hidden; 
        }
        .progress-bar { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, var(--gold), var(--light-gold));
            box-shadow: 0 0 15px var(--gold);
            transition: width 0.4s ease-out; 
        }

        .loading-text {
            margin-top: 15px; 
            color: var(--gold); 
            font-size: 0.85rem;
            letter-spacing: 1px; 
            opacity: 0.8; 
            font-weight: bold;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           الهيدر والمحتوى
           ========================================= */
        header {
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); position: sticky; top: 0; z-index: 999;
        }

        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); animation: logoSpin 12s linear infinite; }
        @keyframes logoSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .desktop-nav { display: flex; gap: 20px; }
        .desktop-nav a { color: #ccc; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .desktop-nav a.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .menu-btn { display: none; font-size: 1.8rem; color: var(--gold); background: none; border: none; cursor: pointer; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; }
        section { display: none; animation: slideUp 0.6s ease-out forwards; }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-panel { background: var(--card-bg); border: 1px solid rgba(212,175,55,0.1); border-radius: 20px; padding: 25px; backdrop-filter: blur(15px); }
        .staff-grid { display: grid; gap: 20px; margin-top: 25px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
        .staff-card { text-align: center; }
        .staff-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }

        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .menu-btn { display: block; }
        }

        .main-bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('https://i.ibb.co/kstGbZ13/THE-CODE-png.png');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div id="splash">
        <div class="splash-top">
            <img src="https://i.ibb.co/SXRwmrPF/HAPPY-LIFE-png.png" class="splash-logo">
            <h1>HAPPY LIFE</h1>
        </div>
        
        <div class="splash-middle">
            <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
            <p class="loading-text" id="statusText">جاري تهيئة البيانات...</p>
        </div>
    </div>

    <header>
        <div class="logo-box">
            <span style="font-weight: 900; color: var(--gold); font-size: 1.1rem;">HAPPY LIFE</span>
            <img src="https://i.ibb.co/SXRwmrPF/HAPPY-LIFE-png.png">
        </div>
        <nav class="desktop-nav">
            <a href="#home" class="nav-link active">الرئيسية</a>
            <a href="#staff" class="nav-link">مسؤولين الإدارة</a>
            <a href="#branches" class="nav-link">الفروع</a>
        </nav>
        <button class="menu-btn" onclick="document.getElementById('sidebar').classList.add('open')">☰</button>
    </header>

    <div class="container">
        <section id="home" class="active">
            <div class="glass-panel" style="border-right: 5px solid var(--gold); text-align: right;">
                <h2 style="color: var(--gold); margin-bottom: 10px;">الحياة السعيدة</h2>
                <p>عـالـم حـيـاة واقـعـيّ لـمـنـصـتـي PS5 , PS4.</p>
            </div>
        </section>

        <section id="staff">
            <h2 style="text-align: center; color: var(--gold); margin-bottom: 25px;">مسؤولين الإدارة</h2>
            <div class="staff-grid">
                <div class="glass-panel staff-card">
                    <img src="https://i.ibb.co/dw05RtPd/7caa03a0f6b0a99150bb758a24ea0e48-png.png" class="staff-img">
                    <h3>مشعل المازني</h3>
                    <p>مالك هابي لايف</p>
                </div>
                <div class="glass-panel staff-card">
                    <img src="https://i.ibb.co/qY3XNRLS/bc3df830ad3ec2ecadafefd5da806322-png.png" class="staff-img">
                    <h3>احمد المغيدي</h3>
                    <p>رئيس هابي لايف</p>
                </div>
                <div class="glass-panel staff-card">
                    <img src="https://i.ibb.co/ymKK6dpp/b568bd32fba8124d8312f220e7233a13-png.png" class="staff-img">
                    <h3>ابو داحم</h3>
                    <p>نائب هابي لايف</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // التحميل
        let width = 0;
        const bar = document.getElementById('bar');
        const statusText = document.getElementById('statusText');
        const stages = ["جاري الاتصال...", "تجهيز السيرفر...", "مرحباً بك!"];

        const interval = setInterval(() => {
            width += Math.random() * 20;
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
                statusText.innerText = stages[2];
                setTimeout(() => {
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 1000);
                }, 500);
            } else {
                bar.style.width = width + '%';
                if(width > 60) statusText.innerText = stages[1];
                else if(width > 30) statusText.innerText = stages[0];
            }
        }, 300);

        // التنقل
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                const target = link.getAttribute('href').substring(1);
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                document.querySelectorAll('section').forEach(s => {
                    s.classList.remove('active');
                    if(s.id === target) s.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
